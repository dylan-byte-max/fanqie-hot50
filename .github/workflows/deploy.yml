name: 部署网页到 GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 准备部署内容
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -r data _site/data

      - name: 上传 Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
