name: 每日爬虫更新数据

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 运行爬虫
        run: node scraper.js

      - name: 提交数据变更
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add data/
          git diff --staged --quiet || git commit -m "📊 更新榜单数据 $(date -u +%Y-%m-%d)"
          git push

      - name: 重新检出最新代码（包含刚 push 的数据）
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: 准备部署内容
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -r data _site/data
          echo "--- 验证部署数据 ---"
          cat _site/data/latest.json | head -5

      - name: 上传 Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
